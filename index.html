<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Outrun the Grid</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0d0d0d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="OTG" />
  <link rel="apple-touch-icon" href="icon.svg" />
</head>
<body>
  <header class="site-header">
    <span class="logo">OUTRUN THE GRID</span>
    <button id="runs-btn" class="runs-btn">&#9655; RUNS</button>
  </header>

  <div id="stats-card" class="stats-card hidden">
    <div class="stats-grid">
      <div class="stat-item"><span class="stat-label">DIST</span><span id="stat-dist" class="stat-value">-</span></div>
      <div class="stat-item"><span class="stat-label">TIME</span><span id="stat-time-val" class="stat-value">-</span></div>
      <div class="stat-item"><span class="stat-label">AVG PACE</span><span id="stat-pace" class="stat-value">-</span></div>
      <div class="stat-item"><span class="stat-label">ELEV +</span><span id="stat-elev" class="stat-value">-</span></div>
    </div>
    <div class="stats-dismiss" id="stats-dismiss">CLICK TO DISMISS</div>
    <button class="stats-close" id="stats-close" aria-label="Close">&#x2715;</button>
  </div>

  <div id="runs-panel" class="runs-panel hidden">
    <div class="runs-panel-header">
      <span>SELECT RUN</span>
      <button id="runs-close" aria-label="Close">&#x2715;</button>
    </div>
    <div id="runs-list" class="runs-list"></div>
  </div>

  <main class="dashboard">
    <!-- Left: video -->
    <section class="panel video-panel">
      <div class="panel-label">FOOTAGE</div>
      <div id="player-wrapper">
        <div id="player"></div>
      </div>
      <div id="video-progress">
        <div id="video-progress-fill"></div>
      </div>
    </section>

    <!-- Right: map + timeline -->
    <section class="panel map-panel">
      <div class="panel-label">TELEMETRY</div>
      <div class="map-container">
        <div id="map"></div>
        <div id="hud" aria-label="Run telemetry">
          <div class="hud-item"><span class="hud-label">PACE</span><span id="hud-pace" class="hud-value">--:--</span></div>
          <div class="hud-item"><span class="hud-label">ELEV</span><span id="hud-ele" class="hud-value">---m</span></div>
          <div class="hud-item"><span class="hud-label">TIME</span><span id="hud-time" class="hud-value">0:00</span></div>
          <button id="voice-btn" class="voice-btn" aria-label="Toggle voice narration" title="Toggle voice narration">VOX</button>
          <div class="lang-toggle" aria-label="Voice language">
            <button class="lang-btn" data-lang="en" title="English narration">EN</button>
            <button class="lang-btn" data-lang="fr" title="Narration en français">FR</button>
          </div>
        </div>
      </div>
      <div id="elevation-profile">
        <svg id="elevation-svg" viewBox="0 0 1000 60" preserveAspectRatio="none">
          <path id="elevation-fill" stroke="none"/>
          <path id="elevation-path" fill="none" stroke="#66fcf1" stroke-width="1.5"/>
          <line id="elevation-playhead" x1="0" y1="0" x2="0" y2="60" stroke="#ff2d78" stroke-width="1.5" opacity="0.8"/>
        </svg>
      </div>
      <div id="route-timeline">
        <div class="timeline-header">
          <span>ROUTE TIMELINE</span>
          <button id="timeline-toggle" aria-label="Toggle route timeline">&#9662;</button>
        </div>
        <div class="filter-bar">
          <button class="filter-btn active" data-filter="historic">HISTORIC</button>
          <button class="filter-btn active" data-filter="places">PLACES</button>
          <button class="filter-btn"        data-filter="stores">STORES</button>
          <button class="filter-btn active" data-filter="wiki">WIKI</button>
          <button class="filter-btn active" data-filter="strava">STRAVA</button>
        </div>
        <div id="timeline-list"></div>
      </div>
    </section>
  </main>

  <div id="did-you-know" class="dyk-panel hidden" role="dialog" aria-modal="true" aria-labelledby="dyk-title">
    <button class="dyk-close" id="dyk-close" aria-label="Close">&#x2715;</button>
    <div class="dyk-source" id="dyk-source"></div>
    <h2 class="dyk-title" id="dyk-title"></h2>
    <p class="dyk-body" id="dyk-body"></p>
    <a class="dyk-link" id="dyk-link" target="_blank" rel="noopener">Read more &#8594;</a>
  </div>

  <div id="segment-card" class="segment-card hidden" role="status" aria-live="polite">
    <div class="seg-label">⚡ SEGMENT</div>
    <div class="seg-name" id="seg-name"></div>
    <div class="seg-timer" id="seg-timer">0:00</div>
    <div class="seg-kom" id="seg-kom"></div>
    <div class="seg-delta" id="seg-delta"></div>
    <div class="seg-pr-badge hidden" id="seg-pr-badge">★ NEW PR</div>
  </div>

  <div id="landmark-card" class="landmark-card hidden" role="status" aria-live="polite">
    <div class="landmark-icon">&#9672;</div>
    <span id="landmark-name"></span>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="js/app.js"></script>
</body>
</html>
